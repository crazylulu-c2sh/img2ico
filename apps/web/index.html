<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>img2ico</title>
  </head>
  <body>
    <main class="container">
      <div class="title-row">
        <h1>img2ico</h1>
        <p class="repo-link">
          <a href="https://github.com/crazylulu-c2sh/img2ico" target="_blank" rel="noopener noreferrer">GitHub 저장소</a>
        </p>
      </div>
      <p>
        브라우저가 디코드할 수 있는 이미지를 파비콘용 멀티 해상도 ICO로 변환합니다. (PNG, JPEG, WebP, GIF, BMP, SVG,
        AVIF, HEIC 등은 브라우저·OS에 따라 다릅니다.)
      </p>
      <div id="dropZone" class="drop-zone" tabindex="0" aria-label="이미지를 여기에 놓기">
        <label class="input-group">
          <span>이미지 선택</span>
          <input id="fileInput" type="file" accept="image/*,.heic,.heif" />
        </label>
        <p class="hint">또는 파일을 이 영역으로 드래그해 놓으세요.</p>
      </div>
      <figure class="preview" id="previewWrap" hidden>
        <figcaption class="preview-caption">편집 미리보기</figcaption>
        <div class="preview-canvas-wrap" aria-hidden="true">
          <canvas id="previewCanvas" role="img" aria-label="편집 미리보기"></canvas>
        </div>
        <section id="editSection" class="edit-section">
          <h2 class="edit-heading">편집</h2>
          <p class="edit-lead">
            ICO로 만들기 전에만 적용됩니다. 맞추기는 콘텐츠에 맞춘 뒤 1:1 정사각으로 맞춥니다. 세부 값은 고급 설정에서
            조절할 수 있습니다.
          </p>
          <div class="edit-simple-toggles">
            <label class="checkbox-row">
              <input id="transparentEnabled" type="checkbox" />
              <span>가장자리 배경 투명화</span>
            </label>
            <label class="checkbox-row">
              <input id="cropEnabled" type="checkbox" checked />
              <span>가장자리 맞추기 (1:1 정사각)</span>
            </label>
          </div>
          <details class="edit-advanced" id="editAdvanced">
            <summary>고급 설정</summary>
            <div class="edit-advanced-body">
              <p class="edit-hint">
                가장자리에서 색이 이어진 영역을 배경으로 보고 투명 처리합니다. 배경과 로고 색이 비슷하면 일부가 지워질 수
                있습니다. 한 변이 4096px를 넘으면 편집 전에 축소합니다.
              </p>
              <fieldset class="seed-fieldset">
                <legend>배경 기준 색</legend>
                <label class="radio-row">
                  <input id="seedAuto" type="radio" name="seedMode" value="auto" checked />
                  <span>모서리 색 자동</span>
                </label>
                <label class="radio-row">
                  <input id="seedManual" type="radio" name="seedMode" value="manual" />
                  <span>직접 지정</span>
                </label>
                <label class="input-group seed-color-row">
                  <span>색상</span>
                  <input id="seedColor" type="color" value="#ffffff" disabled />
                </label>
              </fieldset>
              <label class="input-group">
                <span>색 허용 오차: <output id="toleranceOut" for="tolerance">32</output></span>
                <input id="tolerance" type="range" min="0" max="80" value="32" />
              </label>
              <label class="input-group">
                <span>배경으로 볼 최소 불투명도: <output id="minAlphaOut" for="minAlphaForMatch">128</output></span>
                <input id="minAlphaForMatch" type="range" min="1" max="255" value="128" />
              </label>
              <label class="input-group">
                <span>맞춘 뒤 패딩(px)</span>
                <input id="paddingPx" type="number" min="0" max="256" value="2" />
              </label>
              <label class="input-group">
                <span>배율: <output id="scaleOut" for="scalePercent">100</output>%</span>
                <input id="scalePercent" type="range" min="50" max="200" value="100" />
              </label>
            </div>
          </details>
        </section>
      </figure>
      <label class="input-group">
        <span>해상도 목록 (쉼표 구분)</span>
        <input id="sizesInput" type="text" value="16,32,48,256" />
      </label>
      <button id="convertButton" type="button">ICO 생성</button>
      <p id="statusText" aria-live="polite"></p>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
